; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Memory configuration for the ESP32-S3-DevKitC-1 with 16MB Flash and 8MB OPI PSRAM
board_build.flash_size = 16MB
board_build.psram_size = opi
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

build_flags =
    -DBOARD_HAS_PSRAM                ; enable PSRAM support in the Arduino framework
    -mfix-esp32-psram-cache-issue    ; hardware workaround required for stable PSRAM on ESP32-S3
    -DARDUINO_USB_CDC_ON_BOOT=1      ; use built-in USB for Serial instead of a separate UART chip

; external libraries managed by PlatformIO (pinned to minimum compatible versions)
lib_deps =
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    adafruit/Adafruit NeoPixel@^1.12.0

monitor_speed = 115200   ; must match Serial.begin() in main.cpp
upload_speed = 921600    ; fast upload via USB; reduce if upload fails
